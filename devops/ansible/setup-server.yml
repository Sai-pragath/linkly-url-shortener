---
- name: Setup DevOps Server with Docker, Jenkins, k3s, and Monitoring
  hosts: all
  become: yes
  tasks:
    - name: Create swap file to prevent OOM on Free Tier
      command: fallocate -l 4G /swapfile
      args:
        creates: /swapfile

    - name: Set permissions on swap file
      file:
        path: /swapfile
        mode: '0600'

    - name: Format swap file
      command: mkswap /swapfile
      when: ansible_swaptotal_mb == 0

    - name: Enable swap file
      command: swapon /swapfile
      when: ansible_swaptotal_mb == 0

    - name: Add swap to fstab
      mount:
        name: none
        src: /swapfile
        fstype: swap
        opts: sw
        passno: 0
        dump: 0
        state: present

    - name: Clean up old conflicting apt repo files to prevent GPG errors
      shell: rm -f /etc/apt/sources.list.d/*docker* /etc/apt/sources.list.d/*jenkins* /etc/apt/sources.list.d/archive_uri_*
      ignore_errors: yes

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - git
          - openjdk-21-jdk
        state: present

    # ==========================
    # DOCKER INSTALLATION
    # ==========================
    - name: Ensure keyrings directory exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker-archive-keyring.asc

    - name: Add Docker repository
      apt_repository:
        repo: deb [arch=amd64 signed-by=/etc/apt/keyrings/docker-archive-keyring.asc] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable
        state: present
        filename: docker

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present

    - name: Ensure Docker service is running
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    # ==========================
    # JENKINS INSTALLATION
    # ==========================
    - name: Remove old broken Jenkins repo file
      file:
        path: /etc/apt/sources.list.d/archive_uri_https_pkg_jenkins_io_debian_stable_binary_.list
        state: absent

    - name: Download Jenkins GPG key
      get_url:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
        dest: /etc/apt/keyrings/jenkins-keyring.asc

    - name: Add Jenkins repository
      apt_repository:
        repo: deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/
        state: present
        filename: jenkins

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present

    - name: Add jenkins user to docker group
      user:
        name: jenkins
        groups: docker
        append: yes

    - name: Ensure Jenkins service is running
      systemd:
        name: jenkins
        state: started
        enabled: yes

    # ==========================
    # KUBERNETES (K3S) INSTALLATION
    # ==========================
    - name: Install k3s
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Ensure k3s config is readable by ubuntu and jenkins
      file:
        path: /etc/rancher/k3s/k3s.yaml
        mode: '0644'

    # ==========================
    # HELM & MONITORING (Prometheus/Grafana)
    # ==========================
    - name: Install Helm
      shell: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm
        
    - name: Add Prometheus Community Helm repo
      shell: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts && helm repo update
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Install Kube-Prometheus-Stack (Prometheus & Grafana)
      shell: >
        helm upgrade --install monitoring prometheus-community/kube-prometheus-stack 
        --namespace monitoring --create-namespace
        --set grafana.service.type=NodePort
        --set grafana.service.nodePort=30000
        --set prometheus.service.type=NodePort
        --set prometheus.service.nodePort=30090
        --timeout 10m
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: helm_install
      until: helm_install.rc == 0
      retries: 3
      delay: 30
