apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: url-shortener-monitor
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: url-shortener
  endpoints:
  - port: http-metrics
    path: "/actuator/prometheus"
    relabelings:
    - targetLabel: application
      replacement: url-shortener
